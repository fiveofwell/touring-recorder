services:
  backend:
    build: ./server
    env_file:
      - ./server/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
